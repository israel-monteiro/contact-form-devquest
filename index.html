<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Formulário com validação</title>

        <link rel="stylesheet" href="./src/css/reset.css" />
        <link rel="stylesheet" href="./src/css/style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <main class="container">
            <section class="contact">
                <div class="contact-info">
                    <h1 class="contact-info__title">FICOU COM DÚVIDA? <span>NOS MANDE UMA MENSAGEM!</span></h1>
                    <p class="contact-info__text">
                        caso tenha ficado com qualquer dúvida basta nos mandar uma mensagem e entraremos em contato em
                        menos de 24h.
                    </p>
                </div>

                <form class="form" action="index.html" method="post" enctype="multipart/form-data">
                    <div class="form-field">
                        <input type="text" class="form-field__input" id="name" name="name" placeholder="Nome completo *" />
                        <span class="form-field__message">campo obrigatório</span>
                    </div>

                    <div class="form-field">
                        <input type="email" class="form-field__input" id="email" name="email" placeholder="Email *" />
                        <span class="form-field__message">campo obrigatório</span>
                    </div>

                    <div class="form-field">
                        <input type="tel" class="form-field__input" id="telefone" name="telefone" placeholder="Telefone *" />
                        <span class="form-field__message">campo obrigatório</span>
                    </div>

                    <div class="form-field">
                        <textarea
                            name="mensagem"
                            id="mensagem"
                            class="form-field__input"
                            placeholder="Mensagem *"
                        ></textarea>
                        <span class="form-field__message">campo obrigatório</span>
                    </div>

                    <p class="form__info">*campos obrigatórios</p>
                    <button type="submit" class="form__button" id="btn-submit">Enviar</button>
                </form>
            </section>
        </main>

        <script src="form-validation.js"></script>
    </body>
</html>
